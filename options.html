<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; margin: 0; padding: 20px; width: 380px; }
        .mb-3 { margin-bottom: 16px; }
        .form-label { display: block; margin-bottom: 4px; font-weight: 500; }
        .form-control, .form-select { display: block; width: 100%; padding: 6px 10px; border: 1px solid #ced4da; border-radius: 4px; font-size: 14px; box-sizing: border-box; }
        .form-control:focus, .form-select:focus { border-color: #86b7fe; outline: 0; box-shadow: 0 0 0 2px rgba(13,110,253,.25); }
        textarea.form-control { resize: vertical; }
        .btn { display: inline-block; padding: 6px 16px; font-size: 14px; border: none; border-radius: 4px; cursor: pointer; }
        .btn-primary { background-color: #0d6efd; color: #fff; }
        .btn-primary:hover { background-color: #0b5ed7; }
    </style>
</head>
<body>
<div>
    <div class="mb-3">
        <label class="form-label" for="serverAddress">服务器地址</label>
        <input class="form-control" id="serverAddress" placeholder="请输入服务器地址，例如: http://localhost:8080/cookies" type="text">
    </div>
    <div class="mb-3">
        <label class="form-label" for="token">鉴权 Token</label>
        <input class="form-control" id="token" placeholder="请输入鉴权 Token" type="text">
    </div>
    <div class="mb-3">
        <label class="form-label" for="domainFilter">监听域名</label>
        <textarea class="form-control" id="domainFilter" placeholder="请输入要监听的域名，支持正则，多个用逗号分隔，例如: /taobao\.com$/,/jd\.com$/"
                  rows="1"></textarea>
    </div>
    <div class="mb-3">
        <label class="form-label" for="cookieNames">Cookie 名称</label>
        <textarea class="form-control" id="cookieNames" placeholder="请输入 Cookie 名称，支持正则，多个用逗号分隔，例如: /token/i,session_id"
                  rows="1"></textarea>
    </div>
    <div class="mb-3">
        <label class="form-label" for="rootDomain">获取根域名 Cookie</label>
        <select class="form-select" id="rootDomain">
            <option selected value="false">否，仅获取当前域名</option>
            <option value="true">是，获取根域名下的所有 Cookie</option>
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label" for="extraBody">额外请求体</label>
        <textarea class="form-control" id="extraBody"
                  placeholder="请输入额外的请求体内容，将合并到请求体中，必须是合法的 JSON"
                  rows="3"></textarea>
    </div>
    <div>
        <button class="btn btn-primary" id="saveButton" type="button">保存</button>
        <button class="btn btn-primary" id="resetButton" type="button">重置</button>
    </div>
</div>
<script src="js/options.js" type="text/javascript"></script>
</body>
</html>
